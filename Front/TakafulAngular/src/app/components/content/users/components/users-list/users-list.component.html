<div class="users-page">

    <div class="header">
      <h2>{{"sidebar.users_page.title" | translate}}</h2>
  
      
      <button class="btn-primary" (click)="openModal()">
        <i class="fa fa-plus"></i> {{"sidebar.users_page.add" | translate}}
      </button>
    </div>
  
    <!-- 🔍 GLOBAL SEARCH -->
    <input
      type="text"
      placeholder="Search..."
      (input)="onSearch($event)"
    />
  
    <div class="actions">
  
        <button class="btn" (click)="exportExcel()">
          <i class="fa fa-file-excel"></i>
        </button>
  
        <button class="btn" (click)="exportPDF()">
          <i class="fa fa-file-pdf"></i>
        </button>
  
        <div class="dropdown">
          <button class="btn" (click)="toggleColumnsMenu()">
            <i class="fa fa-table"></i>
          </button>
  
          <div class="menu" *ngIf="showColumnsMenu">
            <label *ngFor="let col of allColumns">
              <input type="checkbox"
                     [checked]="col.visible"
                     (change)="toggleColumn(col)" />
              {{ col.label }}
            </label>
          </div>
        </div>
      </div>
    <!-- 📊 TABLE -->
    <div class="table">
  
      <!-- HEADER -->
      <div class="row header">
        <ng-container *ngFor="let col of visibleColumns">
          <span (click)="sort(col.field)">
            {{ col.label | translate }}
            <i class="fa fa-sort"></i>
          </span>
        </ng-container>
      </div>
  
      <!-- FILTER ROW -->
      <div class="row filters">
        <ng-container *ngFor="let col of visibleColumns">
          <span>
            <input
              type="text"
              (input)="onColumnFilter(col.field, $event)"
              placeholder="Filter..."
            />
          </span>
        </ng-container>
      </div>
  
      <!-- DATA -->
      <div class="row" *ngFor="let user of users">
        <ng-container *ngFor="let col of visibleColumns">
          <span>
  
            <!-- dynamic render -->
            <ng-container [ngSwitch]="col.field">
  
              <span *ngSwitchCase="'status'"
                    [class.active]="user.isActive"
                    [class.inactive]="!user.isActive">
                {{ user.isActive ? 'Active' : 'Inactive' }}
              </span>
  
              <span *ngSwitchDefault>
                {{ user[col.field] }}
              </span>
  
            </ng-container>
  
          </span>
        </ng-container>
      </div>
  
    </div>
  
    <div class="pagination">
        <button class="btn" (click)="prev()" [disabled]="page === 0">Prev</button>
      
        <span>{{ page + 1 }} / {{ totalPages }}</span>
      
        <button class="btn" (click)="next()" [disabled]="page + 1 >= totalPages">Next</button>
      </div>
  
  </div>

<div class="modal" *ngIf="showModal">
  <div class="modal-card">
    <h3>إضافة مستخدم</h3>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="grid">
        <input formControlName="nameAr" placeholder="الاسم الأول" />
        <input formControlName="lastNameAr" placeholder="الاسم الثاني" />

        <input formControlName="username" placeholder="اسم المستخدم" />

        <input formControlName="phone" placeholder="رقم الجوال" />
        <input formControlName="email" placeholder="البريد الإلكتروني" />

        <input
          type="password"
          formControlName="password"
          placeholder="كلمة المرور"
        />

        <select formControlName="roleId">
          <option *ngFor="let r of roles" [value]="r.id">
            {{ r.name }}
          </option>
        </select>
      </div>

      <div class="toggles">
        <label>
          حالة الحساب
          <input type="checkbox" formControlName="isActive" />
        </label>

        <label>
          إمكانية الطباعة
          <input type="checkbox" formControlName="canPrint" />
        </label>
      </div>

      <div class="actions">
        <button class="btn text-dark btn-danger" (click)="close()">إلغاء</button>
        <button class="btn text-dark btn-primary" type="submit">حفظ</button>
      </div>
    </form>
  </div>
</div>
